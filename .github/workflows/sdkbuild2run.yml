name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: windows-latest
    env:
      ProductClientId: ${{ secrets.PRODUCTCLIENTID }}
      ProductClientSecret: ${{ secrets.PRODUCTCLIENTSECRET }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Debug - Find Example folder
      run: |
        Write-Host "=== Current Directory ==="
        Get-Location
        
        Write-Host "=== Root Level Directories ==="
        Get-ChildItem -Directory | Select-Object Name
        
        Write-Host "=== Searching for Example Directories ==="
        Get-ChildItem -Directory -Recurse -Depth 3 | Where-Object { $_.Name -like "*xample*" } | Select-Object FullName
        
        Write-Host "=== Searching for Example Java Files ==="
        Get-ChildItem -Path . -Filter "*Example*.java" -Recurse -Depth 3 | Select-Object FullName

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Run Examples
      run: |
        $env:CellsCloudClientId = "${{ secrets.PRODUCTCLIENTID }}"
        $env:CellsCloudClientSecret = "${{ secrets.PRODUCTCLIENTSECRET }}"
        $env:CellsCloudApiBaseUrl = "https://api.aspose.cloud"
        
        Write-Host "=== Current Directory ==="
        Get-Location
        
        Write-Host "=== Listing All Directories (Depth 3) ==="
        Get-ChildItem -Directory -Recurse -Depth 3 | Select-Object FullName
        
        Write-Host "=== Searching All Java Files (Depth 3) ==="
        Get-ChildItem -Path . -Filter "*.java" -Recurse -Depth 3 | Select-Object FullName
        
        Write-Host "=== Trying Multiple Possible Example Paths ==="
        $possiblePaths = @(
          "Example",
          "Examples",
          "example",
          "examples",
          "src/test/java/com/aspose/cloud/cells/api",
          "src/main/java/com/aspose/cloud/cells/api"
        )
        
        $examplePath = $null
        foreach ($path in $possiblePaths) {
          if (Test-Path $path) {
            Write-Host "Found directory: $path"
            $javaFiles = Get-ChildItem -Path $path -Filter "*.java" -Recurse
            if ($javaFiles.Count -gt 0) {
              Write-Host "  Found $($javaFiles.Count) Java files in this directory"
              $examplePath = $path
              break
            }
          }
        }
        
        if ($examplePath) {
          Write-Host "=== Using Path: $examplePath ==="
          $files = Get-ChildItem -Path $examplePath -Filter "*.java" -Recurse
          
          foreach ($file in $files) {
            $className = $file.BaseName
            Write-Host ">>> Running: $className"
            try {
              mvn exec:java -Dexec.mainClass="com.aspose.cloud.cells.api.$className" -Dexec.classpathScope=test
              Write-Host ">>> Success: $className"
            } catch {
              Write-Host ">>> Failed: $className - $_"
            }
          }
        } else {
          Write-Host "=== Example directory not found. Please check repository structure ==="
        }
      continue-on-error: true

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6