name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: windows-latest
    env:
      ProductClientId: ${{ secrets.PRODUCTCLIENTID }}
      ProductClientSecret: ${{ secrets.PRODUCTCLIENTSECRET }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Run Examples
      run: |
        $env:CellsCloudClientId = "${{ secrets.PRODUCTCLIENTID }}"
        $env:CellsCloudClientSecret = "${{ secrets.PRODUCTCLIENTSECRET }}"
        $env:CellsCloudApiBaseUrl = "https://api.aspose.cloud"
        
        $files = Get-ChildItem -Path "Examples" -Filter "*.java" -Recurse
        
        foreach ($file in $files) {
          $className = $file.BaseName
          Write-Host ">>> Running: $className"
          
          $mainClass = "com.aspose.cloud.cells.api.$className"
          
          & mvn exec:java "-Dexec.mainClass=$mainClass" "-Dexec.classpathScope=test" --no-transfer-progress
          
          if ($LASTEXITCODE -eq 0) {
            Write-Host ">>> Success: $className"
          } else {
            Write-Host ">>> Failed: $className (exit code: $LASTEXITCODE)"
          }
        }
      continue-on-error: true

    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6